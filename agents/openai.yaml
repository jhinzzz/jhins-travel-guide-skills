interface:
  display_name: "Jhins Trip Planner"
  short_description: "End-to-end trip planner: pre-trip prep, round-trip transport, hotels, day-by-day itineraries with weather and buffer times, route-fit dining, local specialties, categorized budget, and source-traceable recommendations. Three modes: planning advice, guide redesign, or page refactor."
  default_prompt: "Use $jhins-trip-planner to turn a trip brief, fragmented notes, or an existing itinerary page into a weather-aware guide; classify whether this is planning-only, guide-redesign, or existing-page-refactor first, then ask for dates, destination, purpose, food preferences, budget, and preferred transport mode."
policy:
  allow_implicit_invocation: true
